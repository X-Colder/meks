services:
  # === Application ===
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - MEKS_DATABASE_URL=postgresql+asyncpg://meks:${POSTGRES_PASSWORD}@postgres:5432/meks
      - MEKS_REDIS_URL=redis://redis:6379/0
      - MEKS_CELERY_BROKER_URL=redis://redis:6379/1
      - MEKS_CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - meks-net

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A meks.pipeline.tasks:celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    environment:
      - MEKS_DATABASE_URL=postgresql+asyncpg://meks:${POSTGRES_PASSWORD}@postgres:5432/meks
      - MEKS_REDIS_URL=redis://redis:6379/0
      - MEKS_CELERY_BROKER_URL=redis://redis:6379/1
      - MEKS_CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - backend
    volumes:
      - ./backend:/app
    networks:
      - meks-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - meks-net

  # === Data Stores ===
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: meks
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meks_dev_password}
      POSTGRES_DB: meks
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meks"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - meks-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - meks-net

  # === Milvus ===
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.16
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - milvus_etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - meks-net

  milvus:
    image: milvusdb/milvus:v2.4-latest
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-meksadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-meks_minio_password}
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - milvus-etcd
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 90s
    networks:
      - meks-net

  # === Object Storage ===
  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-meksadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-meks_minio_password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meks-net

  # === AI/ML ===
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - meks-net

volumes:
  postgres_data:
  redis_data:
  milvus_etcd_data:
  milvus_data:
  minio_data:
  ollama_data:

networks:
  meks-net:
    driver: bridge
