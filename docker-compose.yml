services:
  # === Application ===
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    image: meks-backend:latest
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - MEKS_DATABASE_URL=postgresql+asyncpg://meks:${POSTGRES_PASSWORD}@postgres:5432/meks
      - MEKS_REDIS_URL=redis://:${REDIS_PASSWORD:-meks_redis_dev}@redis:6379/0
      - MEKS_CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-meks_redis_dev}@redis:6379/1
      - MEKS_CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-meks_redis_dev}@redis:6379/2
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CODEX_API_KEY=${CODEX_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - meks-net

  worker:
    image: meks-backend:latest
    command: celery -A meks.pipeline.tasks:celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    environment:
      - MEKS_DATABASE_URL=postgresql+asyncpg://meks:${POSTGRES_PASSWORD}@postgres:5432/meks
      - MEKS_REDIS_URL=redis://:${REDIS_PASSWORD:-meks_redis_dev}@redis:6379/0
      - MEKS_CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-meks_redis_dev}@redis:6379/1
      - MEKS_CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-meks_redis_dev}@redis:6379/2
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CODEX_API_KEY=${CODEX_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - meks-net

  beat:
    image: meks-backend:latest
    command: celery -A meks.pipeline.tasks:celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    env_file: .env
    environment:
      - MEKS_DATABASE_URL=postgresql+asyncpg://meks:${POSTGRES_PASSWORD}@postgres:5432/meks
      - MEKS_REDIS_URL=redis://:${REDIS_PASSWORD:-meks_redis_dev}@redis:6379/0
      - MEKS_CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-meks_redis_dev}@redis:6379/1
      - MEKS_CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-meks_redis_dev}@redis:6379/2
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CODEX_API_KEY=${CODEX_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - meks-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
    image: meks-frontend:latest
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - meks-net

  # === Data Stores ===
  postgres:
    image: docker.m.daocloud.io/library/postgres:16.3-alpine
    environment:
      POSTGRES_USER: meks
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: meks
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meks"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - meks-net

  redis:
    image: docker.m.daocloud.io/library/redis:7.2-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-meks_redis_dev} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-meks_redis_dev}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - meks-net

  # === Milvus ===
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd --auto-compaction-mode=revision --auto-compaction-retention=1000 --quota-backend-bytes=4294967296
    volumes:
      - milvus_etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - meks-net

  milvus:
    image: docker.m.daocloud.io/milvusdb/milvus:v2.4.9
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      COMMON_STORAGETYPE: minio
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      milvus-etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 90s
    restart: unless-stopped
    networks:
      - meks-net

  # === Object Storage ===
  minio:
    image: docker.m.daocloud.io/minio/minio:RELEASE.2024-06-13T22-53-53Z
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - meks-net

  # === AI/ML ===
  vllm-embed:
    profiles: ["local-ai"]
    image: docker.m.daocloud.io/vllm/vllm-openai:v0.6.4
    command: >
      --model /models/bge-large-zh-v1.5
      --host 0.0.0.0 --port 8001
      --max-model-len 512
      --dtype float16
      --task embedding
    volumes:
      - ${VLLM_MODELS_DIR:-./models}/bge-large-zh-v1.5:/models/bge-large-zh-v1.5:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    networks:
      - meks-net

  vllm-chat:
    profiles: ["local-ai"]
    image: docker.m.daocloud.io/vllm/vllm-openai:v0.6.4
    command: >
      --model /models/Qwen2.5-14B-Instruct
      --host 0.0.0.0 --port 8002
      --max-model-len 4096
      --dtype float16
      --gpu-memory-utilization 0.90
    volumes:
      - ${VLLM_MODELS_DIR:-./models}/Qwen2.5-14B-Instruct:/models/Qwen2.5-14B-Instruct:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    restart: unless-stopped
    networks:
      - meks-net

volumes:
  postgres_data:
  redis_data:
  milvus_etcd_data:
  milvus_data:
  minio_data:

networks:
  meks-net:
    driver: bridge
